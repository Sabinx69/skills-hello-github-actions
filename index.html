<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Digital Vibe</title>
  <style>
    body {
      background: linear-gradient(to bottom right, #1a1a1a, #000000);
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 3em;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    p {
      font-size: 1.2em;
      max-width: 700px;
      margin: 20px auto;
      line-height: 1.7;
    }

    img {
      width: 250px;
      border-radius: 20px;
      box-shadow: 0 0 15px #00ffcc;
      margin-top: 30px;
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.05);
    }

    a.button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background: #00ffcc;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 30px;
      box-shadow: 0 0 10px #00ffcc;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    a.button:hover {
      background: #00ffaa;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <h1>Welcome to My World</h1>
  <p>
    You’ve just stepped into my digital aura —  
    where creativity flows, vibes glow, and every pixel knows my story.
  </p>

  <img src="https://i.imgur.com/2nCt3Sbl.jpg" alt="My Aesthetic Image" />

  <br />

  <a class="button" href="https://youtube.com/@sabinx16" target="_blank">
    Check Out My Channel 🎥
  </a>
</body>
</html>
